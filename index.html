<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARL BMBM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            margin: 10px 0;
        }
        nav a {
            margin: 0 15px;
            color: #fff;
            text-decoration: none;
        }
        section {
            padding: 20px;
            margin: 10px;
            background: white;
            border-radius: 5px;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #333;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            max-width: 400px;
            margin: auto;
        }
        .contact-form input, .contact-form textarea {
            margin: 5px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .map-container {
            width: 100%;
            height: 400px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>SARL BMBM</h1>
        <nav>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
            <a href="#location">Location</a>

    </header>

    <section id="services">
        <h2>Our Services</h2>
        <ul>

    <section id="contact">
        <h2>Contact Us</h2>
        <form class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Submit</button>
        </form>
        <p>
            <strong>Company:</strong> SARL BMBM<br>

            <strong>Phone:</strong> +213 553 64 65 06<br>
            <strong>Email:</strong> touil.melila@gmail.com<br>
            <strong>Hours:</strong> Saturday to Thursday 8h-17h
        </p>
    </section>

    <section id="location">

        </div>
    </section>

    <footer>
